<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도현이의 사이트</title>
    <style>
        /* 기본 여백 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 4색 그라데이션 애니메이션 배경 */
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            overflow: hidden;
        }

        /* 배경이 움직이는 효과 */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 중앙 정렬 컨테이너 */
        .container {
            text-align: center;
        }

        /* 도현이의 사이트 타이틀 스타일 및 둥둥 떠 있는 애니메이션 */
        h1 {
            color: white;
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 시작 버튼 스타일 및 마우스 오버 애니메이션 */
        .btn-start {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            color: #e73c7e;
            background-color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease; /* 효과가 부드럽게 변하도록 설정 */
        }

        /* 버튼에 마우스를 올렸을 때(Hover) 효과 */
        .btn-start:hover {
            transform: scale(1.15); /* 크기가 1.15배 커짐 */
            background-color: #e73c7e;
            color: white;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>도현이의 사이트</h1>
        <button class="btn-start">시작</button>
    </div>

</body>
</html>
