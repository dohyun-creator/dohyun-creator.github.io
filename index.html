<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도현이의 사이트</title>
    <style>
        /* 기본 여백 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 4색 그라데이션 애니메이션 배경 */
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            overflow: hidden;
        }

        /* 배경이 움직이는 효과 */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 공통 컨테이너 효과 (유리 느낌 창) */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            max-width: 800px;
            width: 90%;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 1단계: 웰컴 화면 */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* [추가] 처음 나타날 때 타이틀 애니메이션 효과 */
        #welcome-screen h1 {
            color: white;
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
            
            /* 등장 애니메이션 (0.8초 동안 아래로 스르륵) */
            animation: titleAppear 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes titleAppear {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 시작 버튼 스타일 및 애니메이션 */
        .btn-start {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            color: #e73c7e;
            background-color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            
            /* 버튼도 글씨가 뜬 후에 부드럽게 나타나도록 연출 */
            animation: buttonFadeIn 1s ease forwards;
        }

        @keyframes buttonFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .btn-start:hover {
            transform: scale(1.15);
            background-color: #e73c7e;
            color: white;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
        }

        /* 2단계: 메인 대시보드 (처음엔 완전히 숨김) */
        #main-screen {
            display: none;
            opacity: 0;
            transform: scale(0.95);
        }

        /* 대시보드가 나타날 때 애니메이션 클래스 */
        #main-screen.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        #main-screen h2 {
            color: white;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* 바로가기 그리드 패널 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            max-height: 380px;
            overflow-y: auto;
            padding: 10px;
        }

        /* 바로가기 개별 카드 및 호버 애니메이션 */
        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .card .icon {
            font-size: 2.2rem;
            transition: transform 0.3s ease;
        }

        .card:hover .icon {
            transform: rotate(5deg) scale(1.1);
        }

        /* 바로가기 추가 양식 */
        .add-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .add-form input {
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.85);
            color: #333;
            font-size: 0.95rem;
            width: 200px;
            transition: all 0.3s;
        }

        .add-form input:focus {
            background: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .add-form button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #23a6d5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .add-form button:hover {
            background: #197da2;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 1단계: 웰컴 화면 -->
    <div id="welcome-screen" class="container">
        <h1>도현이의 사이트</h1>
        <button class="btn-start" onclick="startApp()">시작</button>
    </div>

    <!-- 2단계: 메인 바로가기 화면 -->
    <div id="main-screen" class="container">
        <h2>바로가기 대시보드</h2>
        <div class="grid" id="shortcut-grid">
            <!-- 자바스크립트가 바로가기 버튼들을 생성합니다 -->
        </div>

        <!-- 새로 추가하는 입력창 -->
        <div class="add-form">
            <input type="text" id="site-name" placeholder="사이트 이름 입력" required>
            <input type="url" id="site-url" placeholder="주소 입력 (https://...)" required>
            <button onclick="addNewShortcut()">추가하기</button>
        </div>
    </div>

    <script>
        // 기본 바로가기 목록
        const defaultShortcuts = [
            { name: '유튜브', url: 'https://www.youtube.com', icon: '📺' },
            { name: '파워포인트', url: 'https://www.microsoft365.com/launch/powerpoint', icon: '📊' },
            { name: '제미니', url: 'https://gemini.google.com', icon: '✨' },
            { name: '구글 워크스페이스', url: 'https://workspace.google.com', icon: '💼' },
            { name: '한글 (한컴독스)', url: 'https://www.hancomdocs.com', icon: '✍️' }
        ];

        // 데이터 불러오기
        let shortcuts = JSON.parse(localStorage.getItem('myShortcuts')) || defaultShortcuts;

        // [수정] 시작 버튼 누르면 화면이 부드럽게 교체되는 함수
        function startApp() {
            const welcome = document.getElementById('welcome-screen');
            const main = document.getElementById('main-screen');
            
            // 웰컴 화면을 스르륵 사라지게 만듦
            welcome.style.opacity = '0';
            welcome.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                welcome.style.display = 'none';
                
                // 바로가기 대시보드 화면을 띄우고 부드럽게 등장시킴
                main.classList.add('active');
                renderShortcuts();
            }, 400); // 0.4초 후 완전 교체
        }

        // 화면에 바로가기 렌더링
        function renderShortcuts() {
            const grid = document.getElementById('shortcut-grid');
            grid.innerHTML = '';

            shortcuts.forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = '_blank';
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="icon">${item.icon || '🔗'}</div>
                    <div>${item.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 새로운 바로가기 추가 함수
        function addNewShortcut() {
            const nameInput = document.getElementById('site-name');
            const urlInput = document.getElementById('site-url');

            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if(!name || !url) {
                alert('이름과 주소를 모두 입력하세요!');
                return;
            }

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            shortcuts.push({ name: name, url: url, icon: '🔗' });
            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));

            renderShortcuts();
            nameInput.value = '';
            urlInput.value = '';
        }
    </script>
</body>
</html>
